      <h1>KTLYST Labs - The Nervous System for Enterprise Security</h1>
      <p>KTLYST is a Security Learning Control Plane (SLCP) that captures what enterprise security teams learn from incidents, intelligence, and investigations, governs that knowledge with provenance and ownership, and enforces it back into existing tools as detections, playbooks, and controls.</p>
      <h2>The Problem</h2>
      <p>Every enterprise has 60+ security tools - 60 muscles with no nervous system. Teams respond to incidents but never institutionalize the lessons. 84% of breached organizations paid ransom. 78% were breached again. 36% by the exact same attacker. LastPass, Okta, T-Mobile, MGM, and Rackspace collectively suffered $900M+ in damages from re-breaches.</p>
      <h2>How It Works</h2>
      <p>KTLYST follows a five-stage pipeline: Ingest security learning from any source. Normalize findings into structured Learning Artifacts with evidence chains. Govern with ownership, approval, and provenance. Enforce outputs into existing tools (Splunk SPL, Snowflake SQL, Elastic KQL, ServiceNow). Compound - every new finding enriches the next response.</p>
      <h2>Team</h2>
      <p>Assaf Kipnis, Founder and CEO - 12 years in threat intelligence at LinkedIn, Google, Meta, and ElevenLabs. Stephan Kaufmann, Co-Founder and COO - 20+ years in security operations at HP, McAfee, and Meta.</p>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('a').forEach(function(link) {
        var href = link.href || '';
        var text = link.textContent.trim();

        if (href.includes('calendly.com')) {
          link.addEventListener('click', function() {
            gtag('event', 'cta_click', {
              link_text: text,
              link_url: href,
              cta_type: 'calendly',
              page_section: getSectionName(link)
            });
          });
        }

        if (href.includes('docs.google.com/forms')) {
          link.addEventListener('click', function() {
            var ctaType = text.toLowerCase().includes('waitlist') ? 'waitlist' : 'design_partner_apply';
            gtag('event', 'cta_click', {
              link_text: text,
              link_url: href,
              cta_type: ctaType,
              page_section: getSectionName(link)
            });
          });
        }

        if (href.startsWith('mailto:')) {
          link.addEventListener('click', function() {
            gtag('event', 'cta_click', {
              link_text: text,
              link_url: href,
              cta_type: 'email',
              page_section: getSectionName(link)
            });
          });
        }

        if (href.includes('linkedin.com/in/')) {
          link.addEventListener('click', function() {
            gtag('event', 'outbound_click', {
              link_text: text,
              link_url: href,
              cta_type: 'linkedin_profile'
            });
          });
        }
      });

      function getSectionName(el) {
        var section = el.closest('section, [role="region"], nav, footer, header');
        if (!section) return 'unknown';
        if (section.tagName === 'NAV' || section.tagName === 'HEADER') return 'nav';
        if (section.tagName === 'FOOTER') return 'footer';
        var heading = section.querySelector('h1, h2');
        if (heading) return heading.textContent.trim().slice(0, 40);
        return 'hero';
      }
    });
    </script>

[KTLYST - Behavioral Detection - Web-based reconnaissance blocked by security controls]
search = index=main sourcetype=endpoint:process process_name IN ("whoami.exe", "net.exe", "nltest.exe", "ipconfig.exe", "systeminfo.exe")
| stats count as recon_count, dc(process_name) as unique_tools, earliest(_time) as first_seen, latest(_time) as last_seen by dest, user
| where recon_count >= 3 OR unique_tools >= 2
| sort -recon_count
| table dest, user, recon_count, unique_tools, first_seen, last_seen
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
is_scheduled = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
enableSched = 1
description = Auto-generated by KTLYST from threat intelligence.


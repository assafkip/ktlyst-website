# KTLYST Cloud Armor policy for NYS Office of Information Technology Services
# Generated: 2026-04-12
# Apply with: gcloud compute security-policies import ktlyst-nys-office-of-information-technology-services-phishing-ioc --source=this_file.yaml

name: ktlyst-nys-office-of-information-technology-services-phishing-ioc
description: 'KTLYST phishing IOC block policy for NYS Office of Information Technology Services'
type: CLOUD_ARMOR
rules:
- priority: 1000
  action: deny(403)
  match:
    expr:
      expression: "request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('iconicsinc.my.site.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('iconics.com') || request.headers['host'].contains('www.mitsubishielectric.co.jp') || request.headers['host'].contains('www.mitsubishielectric.co.jp')"
  description: 'Block requests referencing KTLYST phishing domains'
- priority: 1100
  action: deny(403)
  match:
    expr:
      expression: "origin.region_code == 'T1'"
  description: 'Block known anonymizer / TOR exit ranges'
- priority: 2000
  action: rate_based_ban
  rateLimitOptions:
    rateLimitThreshold:
      count: 100
      intervalSec: 60
    banDurationSec: 600
    conformAction: allow
    exceedAction: deny(429)
    enforceOnKey: IP
  match:
    versionedExpr: SRC_IPS_V1
    config:
      srcIpRanges:
      - '*'
  description: 'Rate-limit unauthenticated requests'
- priority: 2147483647
  action: allow
  match:
    versionedExpr: SRC_IPS_V1
    config:
      srcIpRanges:
      - '*'
  description: 'Default allow'

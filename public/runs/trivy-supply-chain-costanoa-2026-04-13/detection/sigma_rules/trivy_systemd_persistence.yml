title: TeamPCP Trivy Supply Chain - systemd User Service Persistence
id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f80
status: experimental
description: |
  Detects creation of the sysmon.py systemd user service used by TeamPCP
  for persistence on developer machines. The service writes to
  ~/.config/systemd/user/sysmon.py and polls the ICP-hosted C2 domain
  (tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io) every 5 minutes for secondary
  payloads.
references:
  - https://www.wiz.io/blog/trivy-compromised-teampcp-supply-chain-attack
author: KTLYST
date: 2026-04-13
tags:
  - attack.persistence
  - attack.t1547.014
  - cve.trivy.teampcp
logsource:
  category: file_event
  product: linux
detection:
  selection_file:
    TargetFilename|endswith:
      - '.config/systemd/user/sysmon.py'
  condition: selection_file
falsepositives:
  - Custom monitoring scripts named sysmon.py in systemd user space (rare).
  - Verify file content for C2 polling to tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io.
level: critical
---
title: TeamPCP Trivy Supply Chain - systemctl Enable sysmon Persistence
id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f81
status: experimental
description: |
  Detects systemctl commands enabling or starting the sysmon.py user service,
  confirming active persistence from the TeamPCP Trivy supply chain attack.
references:
  - https://www.wiz.io/blog/trivy-compromised-teampcp-supply-chain-attack
author: KTLYST
date: 2026-04-13
tags:
  - attack.persistence
  - attack.t1547.014
  - cve.trivy.teampcp
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains|all:
      - 'systemctl'
      - '--user'
      - 'sysmon'
  condition: selection
falsepositives:
  - Legitimate systemd user service management referencing "sysmon" (unlikely).
level: high

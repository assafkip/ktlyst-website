title: TeamPCP Trivy Supply Chain - Compromised v0.69.4 Binary Execution
id: c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f
status: experimental
description: |
  Detects execution of any of the 10 compromised Trivy v0.69.4 platform
  binaries by SHA-256 hash. These binaries contain credential-stealing malware
  that runs alongside legitimate Trivy functionality, collecting environment
  variables and filesystem credentials before exfiltrating to C2.

# -----------------------------------------------------------------------------
# 1. DNS Queries to TeamPCP C2 Domains
# MITRE: T1041 - Exfiltration Over C2 Channel
# Tier 1 (auto-deploy): IOC-based DNS block
# -----------------------------------------------------------------------------
[KTLYST - Trivy TeamPCP - DNS C2 Beacon]
search = index=dns OR index=network sourcetype=stream:dns OR sourcetype=dns \
  (query="scan.aquasecurtiy.org" OR query="*.aquasecurtiy.org" \
   OR query="tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io" \
   OR query="plug-tab-protective-relay.trycloudflare.com") \
| stats count earliest(_time) AS first_seen latest(_time) AS last_seen values(src_ip) AS source_ips BY query \
| eval advisory="Trivy/TeamPCP Supply Chain (March 2026)" \
| eval severity="critical" \
| table query source_ips count first_seen last_seen advisory severity
dispatch.earliest_time = -7d
dispatch.latest_time = now
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 1h
description = Detects DNS resolution to TeamPCP C2 infrastructure. scan.aquasecurtiy[.]org is the primary exfiltration domain (typosquatted). tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io is the ICP-hosted fallback for secondary payload delivery. plug-tab-protective-relay.trycloudflare.com is the Cloudflare Tunnel C2.


# -----------------------------------------------------------------------------
# 4. systemd User Service Persistence (sysmon.py)
# MITRE: T1547.014 - Boot/Logon Autostart Execution (systemd)
# Tier 2 (detection-as-code): behavioral pattern
# -----------------------------------------------------------------------------
[KTLYST - Trivy TeamPCP - systemd Persistence sysmon.py]
search = index=endpoint sourcetype=sysmon OR sourcetype=linux:audit OR sourcetype=osquery \
  (CommandLine="*systemd/user/sysmon*" \
   OR TargetFilename="*/.config/systemd/user/sysmon.py" \
   OR file_path="*/.config/systemd/user/sysmon.py" \
   OR CommandLine="*systemctl*--user*enable*sysmon*" \
   OR CommandLine="*systemctl*--user*start*sysmon*") \
| stats count earliest(_time) AS first_seen latest(_time) AS last_seen values(host) AS hosts values(user) AS users BY CommandLine, TargetFilename \
| eval advisory="Trivy/TeamPCP Supply Chain (March 2026)" \
| eval persistence_type="systemd user service" \
| eval c2_poll="tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io (every 5 min)" \
| table hosts users CommandLine TargetFilename count first_seen last_seen advisory persistence_type c2_poll
dispatch.earliest_time = -30d
dispatch.latest_time = now
alert.severity = 5
alert.suppress = 0
description = Detects creation or enabling of the sysmon.py systemd user service, the persistence mechanism used by TeamPCP. This service polls the ICP-hosted C2 (tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io) every 5 minutes for secondary payloads.

# -----------------------------------------------------------------------------
# 5. /proc/*/mem Memory Scraping
# MITRE: T1005 - Data from Local System
# Tier 2 (detection-as-code): behavioral pattern
# -----------------------------------------------------------------------------
[KTLYST - Trivy TeamPCP - proc mem Credential Scraping]
search = index=endpoint sourcetype=linux:audit OR sourcetype=sysmon \
  (CommandLine="*/proc/*/mem*" \
   OR file_path="/proc/*/mem" \
   OR syscall=open path="/proc/*/mem") \
  NOT (process_name=gdb OR process_name=strace OR process_name=valgrind OR process_name=lldb) \
| stats count earliest(_time) AS first_seen latest(_time) AS last_seen values(host) AS hosts values(user) AS users values(process_name) AS processes BY CommandLine \
| where count > 3 \
| eval advisory="Trivy/TeamPCP Supply Chain (March 2026)" \
| eval technique="Memory scraping via /proc/pid/mem for credential extraction" \
| table hosts users processes CommandLine count first_seen last_seen advisory technique
dispatch.earliest_time = -7d
dispatch.latest_time = now
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 4h
description = Detects access to /proc/pid/mem which the TeamPCP malware uses to scrape running process memory for secrets, tokens, and credentials. Excludes legitimate debugging tools (gdb, strace, valgrind, lldb). Threshold of 3+ events reduces false positives.

# -----------------------------------------------------------------------------
# 6. GitHub API - tpcp-docs Exfiltration Repo Creation
# MITRE: T1041 - Exfiltration Over C2 Channel
# Tier 2 (detection-as-code): behavioral pattern
# -----------------------------------------------------------------------------
[KTLYST - Trivy TeamPCP - GitHub tpcp-docs Repo Exfil]
search = index=proxy OR index=network sourcetype=stream:http OR sourcetype=bluecoat OR sourcetype=zscaler \
  (url="*api.github.com*" AND (url="*repos*" OR url="*user/repos*") AND http_method=POST) \
| rex field=url "api\.github\.com/(?<api_path>.*)" \
| rex field=_raw "\"name\"\s*:\s*\"(?<repo_name>[^\"]+)\"" \
| search repo_name="tpcp-docs" OR repo_name="tpcp*" \
| stats count earliest(_time) AS first_seen latest(_time) AS last_seen values(src_ip) AS source_ips values(user) AS users BY repo_name, api_path \
| eval advisory="Trivy/TeamPCP Supply Chain (March 2026)" \
| eval exfil_method="Malware creates GitHub repos named tpcp-docs to store AES-256-CBC + RSA-4096 encrypted credential bundles" \
| table repo_name source_ips users api_path count first_seen last_seen advisory exfil_method
dispatch.earliest_time = -30d
dispatch.latest_time = now
alert.severity = 5
alert.suppress = 0
description = Detects GitHub API calls creating repositories named tpcp-docs. The TeamPCP malware uses GitHub repo creation as a fallback exfiltration channel when the Cloudflare Tunnel C2 is unavailable. Stolen credentials are AES-256-CBC + RSA-4096 encrypted and pushed as tpcp.tar.gz.

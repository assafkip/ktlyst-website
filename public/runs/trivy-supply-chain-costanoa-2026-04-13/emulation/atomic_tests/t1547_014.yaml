---
attack_technique: T1547.014
display_name: "Boot or Logon Autostart Execution: Active Setup"
atomic_tests:
  - name: "KTLYST - systemd User Service Persistence Simulation"
    auto_generated_guid: e5f6a7b8-9c0d-1e2f-3a4b-5c6d7e8f9a05
    description: |
      Simulates the sysmon.py systemd user service persistence mechanism
      used by Trivy/TeamPCP. The malware installs a Python script that
      polls the ICP-hosted C2 every 5 minutes for secondary payloads.
    supported_platforms:
      - linux
    executor:
      name: bash
      command: |
        echo "=== systemd Persistence Simulation ==="

        # Create the persistence directory (same path as real malware)
        mkdir -p ~/.config/systemd/user/

        # Create a benign test script (NOT the actual malware)
        cat > ~/.config/systemd/user/test_persist.py << 'PYEOF'
        #!/usr/bin/env python3
        # KTLYST test - simulates sysmon.py persistence
        # In the real attack, this polls tdtqy-oyaaa-aaaae-af2dq-cai.raw.icp0.io
        import time
        print("Test persistence script - would poll C2 every 5 minutes")
        PYEOF

        chmod +x ~/.config/systemd/user/test_persist.py
        echo "Created test persistence at ~/.config/systemd/user/test_persist.py"
        echo "Test complete - check if EDR detected file creation in systemd user dir"
      cleanup_command: |
        rm -f ~/.config/systemd/user/test_persist.py

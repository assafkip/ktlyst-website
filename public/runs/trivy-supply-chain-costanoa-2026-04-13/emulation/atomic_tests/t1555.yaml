---
attack_technique: T1555
display_name: "Credentials from Password Stores"
atomic_tests:
  - name: "KTLYST - Credential File Sweep Simulation"
    auto_generated_guid: c3d4e5f6-7a8b-9c0d-1e2f-3a4b5c6d7e03
    description: |
      Simulates the credential file sweep performed by the Trivy/TeamPCP
      malware. The payload searched for SSH keys, cloud credentials, API
      tokens, and .env files on developer machines and CI/CD runners.
    supported_platforms:
      - linux
      - macos
    executor:
      name: bash
      command: |
        echo "=== Credential File Sweep Simulation ==="
        echo "Searching for credential files (read-only, no exfil)..."

        # SSH keys
        ls -la ~/.ssh/ 2>/dev/null && echo "[FOUND] SSH directory"

        # Cloud credentials
        ls -la ~/.aws/credentials 2>/dev/null && echo "[FOUND] AWS credentials"
        ls -la ~/.config/gcloud/ 2>/dev/null && echo "[FOUND] GCP config"
        ls -la ~/.azure/ 2>/dev/null && echo "[FOUND] Azure config"

        # Docker credentials
        ls -la ~/.docker/config.json 2>/dev/null && echo "[FOUND] Docker config"

        # npm tokens
        ls -la ~/.npmrc 2>/dev/null && echo "[FOUND] npmrc"

        # .env files in common locations
        find /tmp -name ".env" -maxdepth 2 2>/dev/null

        echo "Test complete - check if EDR detected bulk credential file access"
      cleanup_command: ""

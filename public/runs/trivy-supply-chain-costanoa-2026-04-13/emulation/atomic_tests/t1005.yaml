---
attack_technique: T1005
display_name: "Data from Local System"
atomic_tests:
  - name: "KTLYST - Process Memory Scraping via /proc/pid/mem"
    auto_generated_guid: b2c3d4e5-6f7a-8b9c-0d1e-2f3a4b5c6d02
    description: |
      Simulates /proc/pid/mem access as observed in the Trivy/TeamPCP GitHub
      Actions payload (Stage 3). The malware scraped runner process memory
      to extract secrets stored in environment variables.
    supported_platforms:
      - linux
    executor:
      name: bash
      command: |
        # Read own process memory (benign simulation)
        PID=$$
        echo "Attempting to read /proc/$PID/mem (benign test)"
        # This will fail without proper offset but triggers the detection
        dd if=/proc/$PID/mem bs=1 count=1 skip=0 2>/dev/null || true
        echo "Test complete - check if EDR/SIEM detected /proc/mem access"
      cleanup_command: ""
